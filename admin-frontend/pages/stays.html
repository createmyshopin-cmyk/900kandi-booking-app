<div class="max-w-7xl mx-auto space-y-6">
  <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Resort Stays</h2>
      <p class="text-gray-500 text-sm mt-1">Manage stay categories, availability, and blocked dates</p>
    </div>
    <button onclick="Stays.openAddStayModal()" class="bg-primary hover:bg-accent text-white px-5 py-2.5 rounded-xl font-medium transition-colors flex items-center gap-2">
      <i class='bx bx-plus'></i> Add New Stay
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="stays-grid">
    <!-- Populated by JS -->
  </div>

  <!-- Visual Calendar -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-8">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
      <h3 class="text-lg font-bold text-gray-900">Availability Calendar</h3>
      <div class="flex items-center gap-4 bg-gray-50 p-1 rounded-xl border border-gray-100">
        <button onclick="Stays.changeMonth(-1)" class="p-2 text-gray-600 hover:bg-white hover:shadow-sm rounded-lg transition-all"><i class='bx bx-chevron-left'></i></button>
        <span id="calendar-month-year" class="font-bold text-gray-800 w-32 text-center">Month Year</span>
        <button onclick="Stays.changeMonth(1)" class="p-2 text-gray-600 hover:bg-white hover:shadow-sm rounded-lg transition-all"><i class='bx bx-chevron-right'></i></button>
      </div>
    </div>
    
    <div class="flex gap-4 mb-4 text-xs font-semibold text-gray-600 flex-wrap">
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-blue-100 border border-blue-300 rounded"></div> Enquiry (Pending)</div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-green-100 border border-green-300 rounded"></div> Checked In / Confirmed</div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-gray-200 border border-gray-400 rounded"></div> Blocked</div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-red-100 border border-red-300 rounded"></div> Sold Out</div>
    </div>

    <div class="grid grid-cols-7 gap-px bg-gray-200 border border-gray-200 rounded-xl overflow-hidden" id="calendar-grid">
      <!-- Calendar header & days injected via JS -->
    </div>
  </div>

  <!-- Calendar for Blocking Dates -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-8">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-lg font-bold text-gray-900">Date Blocking System</h3>
      <button onclick="Stays.openBlockDateModal()" class="text-accent font-medium hover:text-primary transition-colors flex items-center gap-1">
        <i class='bx bx-calendar-x'></i> Block Dates
      </button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse" id="blocked-dates-table">
        <thead class="text-xs text-gray-500 uppercase bg-gray-50">
          <tr>
            <th class="p-4 font-semibold text-gray-600">Stay Category</th>
            <th class="p-4 font-semibold text-gray-600">Start Date</th>
            <th class="p-4 font-semibold text-gray-600">End Date</th>
            <th class="p-4 font-semibold text-gray-600">Reason</th>
            <th class="p-4 text-right font-semibold text-gray-600">Actions</th>
          </tr>
        </thead>
        <tbody id="blocked-dates-body" class="text-sm divide-y divide-gray-100">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>
