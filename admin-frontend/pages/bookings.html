<div class="space-y-6">
  
  <!-- Top Controls -->
  <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 justify-between items-center">
    
    <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
      <!-- Search -->
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <i class='bx bx-search text-gray-400'></i>
        </div>
        <input type="text" id="search-input" placeholder="Search name or mobile..." class="pl-10 w-full sm:w-64 rounded-xl border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow">
      </div>
      
      <!-- Status Filter -->
      <select id="status-filter" class="rounded-xl border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow text-gray-700 bg-white">
        <option value="all">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <!-- Export Button -->
    <button onclick="Bookings.exportCSV()" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-gray-900 hover:bg-black text-white px-5 py-2 rounded-xl text-sm font-medium transition-colors">
      <i class='bx bx-export'></i>
      Export CSV
    </button>
  </div>

  <!-- Table Container -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse min-w-[800px]">
        <thead class="sticky top-0 bg-gray-50 z-10 border-b border-gray-200">
          <tr class="text-gray-500 text-xs uppercase tracking-wider">
            <th class="p-4 font-semibold">ID</th>
            <th class="p-4 font-semibold">Guest Name</th>
            <th class="p-4 font-semibold">Mobile</th>
            <th class="p-4 font-semibold">Dates</th>
            <th class="p-4 font-semibold">Guests</th>
            <th class="p-4 font-semibold">Status</th>
            <th class="p-4 font-semibold">Created</th>
            <th class="p-4 font-semibold text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="bookings-table-body" class="text-sm text-gray-700 divide-y divide-gray-100">
          <!-- Populated via JS -->
        </tbody>
      </table>
    </div>
    
    <!-- Loading State -->
    <div id="bookings-loading" class="flex items-center justify-center p-12 text-accent">
      <i class='bx bx-loader-alt animate-spin text-4xl'></i>
    </div>

    <!-- Empty State -->
    <div id="bookings-empty" class="hidden flex-col items-center justify-center p-12 text-gray-500">
      <i class='bx bx-calendar-x text-5xl mb-3 text-gray-300'></i>
      <p class="text-base font-medium">No bookings found</p>
      <p class="text-sm mt-1">Try adjusting your search or filters.</p>
    </div>
  </div>
</div>
