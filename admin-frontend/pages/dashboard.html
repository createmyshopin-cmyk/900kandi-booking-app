<div class="space-y-6">
  <!-- Stats Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Total Bookings -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-green-50 flex items-center justify-center text-accent mr-4">
        <i class='bx bx-calendar-check text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Total Bookings</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-total-bookings">0</h3>
      </div>
    </div>
    
    <!-- Today's Check-ins -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mr-4">
        <i class='bx bx-log-in text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Today's Check-ins</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-today-checkins">0</h3>
      </div>
    </div>
    
    <!-- Tomorrow's Check-ins -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-yellow-50 flex items-center justify-center text-yellow-600 mr-4">
        <i class='bx bx-calendar-event text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Tomorrow's Check-ins</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-tomorrow-checkins">0</h3>
      </div>
    </div>
    
    <!-- Total Guests -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600 mr-4">
        <i class='bx bx-group text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Total Guests</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-total-guests">0</h3>
      </div>
    </div>
  </div>

  <!-- Check-ins Lists -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
    <!-- Today's Check-ins List -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-50/50">
        <h3 class="text-lg font-bold text-blue-900">Today's Guests</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <tbody id="today-guests-list" class="text-sm text-gray-700 divide-y divide-gray-100">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tomorrow's Check-ins List -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-yellow-50/50">
        <h3 class="text-lg font-bold text-yellow-900">Tomorrow's Guests</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <tbody id="tomorrow-guests-list" class="text-sm text-gray-700 divide-y divide-gray-100">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
