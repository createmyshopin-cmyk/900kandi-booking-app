<div class="space-y-6">
  <!-- Stats Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Total Bookings -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-green-50 flex items-center justify-center text-accent mr-4">
        <i class='bx bx-calendar-check text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Total Bookings</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-total-bookings">0</h3>
      </div>
    </div>
    
    <!-- Today's Bookings -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mr-4">
        <i class='bx bx-time-five text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Today's Bookings</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-today-bookings">0</h3>
      </div>
    </div>
    
    <!-- Upcoming Check-ins -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-yellow-50 flex items-center justify-center text-yellow-600 mr-4">
        <i class='bx bx-log-in-circle text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Upcoming Check-ins</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-upcoming">0</h3>
      </div>
    </div>
    
    <!-- Total Guests -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600 mr-4">
        <i class='bx bx-group text-2xl'></i>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500 mb-1">Total Guests</p>
        <h3 class="text-2xl font-bold text-gray-800" id="stat-total-guests">0</h3>
      </div>
    </div>
  </div>

  <!-- Recent Bookings Preview -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mt-8">
    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
      <h3 class="text-lg font-bold text-gray-800">Recent Bookings</h3>
      <button onclick="UI.navigateTo('bookings')" class="text-sm font-medium text-accent hover:text-primary transition-colors">View All</button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
            <th class="p-4 font-medium">Guest</th>
            <th class="p-4 font-medium">Dates</th>
            <th class="p-4 font-medium">Status</th>
          </tr>
        </thead>
        <tbody id="recent-bookings-list" class="text-sm text-gray-700 divide-y divide-gray-100">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>
