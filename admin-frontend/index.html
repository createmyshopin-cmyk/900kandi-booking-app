<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxeStay Admin</title>
  <!-- Boxicons -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#0f3d2e',
            accent: '#1f7a5a',
            sidebar: '#000000',
            bglight: '#f8fafc'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-bglight text-gray-800 font-sans antialiased overflow-hidden">
  
  <div class="flex h-screen w-full">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="bg-sidebar text-white w-64 flex-shrink-0 flex flex-col transition-all duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-40 h-full">
      <div class="h-16 flex items-center px-6 border-b border-gray-800">
        <i class='bx bxs-building-house text-accent text-2xl mr-2'></i>
        <span class="text-xl font-bold tracking-wide">LuxeStay</span>
      </div>
      
      <div class="flex-1 overflow-y-auto py-6">
        <ul class="space-y-2 px-4" id="nav-menu">
          <li>
            <a href="#" data-route="dashboard" class="nav-link flex items-center px-4 py-3 bg-accent text-white rounded-xl transition-colors">
              <i class='bx bx-grid-alt text-xl mr-3'></i>
              <span class="font-medium">Dashboard</span>
            </a>
          </li>
          <li>
            <a href="#" data-route="bookings" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-colors">
              <i class='bx bx-calendar-event text-xl mr-3'></i>
              <span class="font-medium">Bookings</span>
            </a>
          </li>
          <li>
            <a href="#" data-route="analytics" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-colors">
              <i class='bx bx-bar-chart-alt-2 text-xl mr-3'></i>
              <span class="font-medium">Analytics</span>
            </a>
          </li>
          <li>
            <a href="#" data-route="guest-checkins" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-colors">
              <i class='bx bx-user-check text-xl mr-3'></i>
              <span class="font-medium">Guest Check-ins</span>
            </a>
          </li>
          <li>
            <a href="#" data-route="settings" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition-colors">
              <i class='bx bx-cog text-xl mr-3'></i>
              <span class="font-medium">Settings</span>
            </a>
          </li>
        </ul>
      </div>

      <a href="../dark-bookings.html" target="_blank" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-colors text-gray-400 hover:bg-gray-800">
        <i class='bx bx-moon text-xl'></i>
        Dark Theme Page
      </a>
      
      <div class="pt-4 mt-4 border-t border-gray-800">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-colors text-gray-400 hover:text-red-400 hover:bg-gray-800">
          <i class='bx bx-log-out text-xl'></i>
          Logout
        </a>
      </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
      
      <!-- Topbar -->
      <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-20 flex-shrink-0">
        <div class="flex items-center">
          <button id="menu-toggle" class="md:hidden text-gray-600 hover:text-primary focus:outline-none mr-4">
            <i class='bx bx-menu text-2xl'></i>
          </button>
          <h1 id="page-title" class="text-xl font-semibold text-gray-800">Dashboard</h1>
        </div>
        
        <div class="flex items-center gap-4">
          <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition-colors">
            <i class='bx bx-bell text-xl'></i>
          </button>
          <div class="flex items-center gap-3 border-l border-gray-200 pl-4">
            <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-sm">
              AD
            </div>
            <div class="hidden md:block">
              <p class="text-sm font-semibold text-gray-800">Admin User</p>
              <p class="text-xs text-gray-500">Super Admin</p>
            </div>
            <i class='bx bx-chevron-down text-gray-400'></i>
          </div>
        </div>
      </header>

      <!-- Main Scrollable Area -->
      <main id="app-content" class="flex-1 overflow-x-hidden overflow-y-auto bg-bglight p-6 relative">
        <!-- Dynamic content goes here -->
        <div class="flex items-center justify-center h-full text-gray-400">
          <i class='bx bx-loader-alt animate-spin text-3xl'></i>
        </div>
      </main>

    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

  <!-- Shared Modal Container -->
  <div id="modal-container" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
    <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg transform scale-95 transition-transform duration-300 max-h-[90vh] overflow-y-auto">
      <!-- Modal content injected dynamically -->
    </div>
  </div>

  <!-- Socket.IO Client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script src="js/api.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/guestCheckins.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Init app
    document.addEventListener('DOMContentLoaded', () => {
      UI.init();
      UI.navigateTo('dashboard');
    });
  </script>
</body>
</html>
